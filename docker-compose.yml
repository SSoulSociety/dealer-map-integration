# Hafta 1 Gün 3 — Oracle Free (gvenzl/oracle-free)
# Not: İlk açılış birkaç dakika sürebilir (image pull + DB bootstrap).
#
# Kullanım:
#   docker compose up -d oracle
#   docker compose logs -f oracle
#
# Bağlantı (DBeaver / SQL*Plus):
#   Host: localhost
#   Port: 1521
#   Service: FREEPDB1
#   User: store_app
#   Password: StoreApp123

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: turkcell-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: OraclePassword123
      APP_USER: store_app
      APP_USER_PASSWORD: StoreApp123
    volumes:
      - oracle-data:/opt/oracle/oradata
      # İlk bootstrap'ta çalışır (container yeniden oluşturulunca değil, volume silinince)
      - ./store-service/sql:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 180s

  redis:
    image: redis:7.4-alpine
    container_name: turkcell-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  oracle-data:
  redis-data:
